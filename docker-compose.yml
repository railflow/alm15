version: '3'
services:
  almservice:
    container_name: AlmService
    build: .
    ports:
      - 8080:8080
      - 443:443
    command: |
      ./wait-for-it.sh DBService:1433 -t 120 -- echo "DBService is up and running"
      ./install_run.sh
      tail -f /dev/null
    depends_on:
      - "dbservice"
  dbservice:
    container_name: DBService
    image: mcr.microsoft.com/mssql/server:2017-CU17-ubuntu
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "DAG1YKdQFbwn80sA"
      MSSQL_PID: "Standard"
    ports:
      - 1433:1433
    volumes:
      - ./sqlserver_data:/var/opt/mssql
