version: '3'
services:
  almservice:
    container_name: AlmService
    image: railflow/alm16
    ports:
      - 8080:8080
      - 443:443
    command: 
        - bash 
        - -c
        - |
          ./wait-for-it.sh dbservice:1433 -t 300 -- echo "DBService is up and running"
          ./install_run.sh
          tail -f /dev/null
  dbservice:
    container_name: DBService
    image: mcr.microsoft.com/mssql/server:2017-CU17-ubuntu
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=DAG1YKdQFbwn80sA
      - MSSQL_PID=Standard
    ports:
      - 1433:1433